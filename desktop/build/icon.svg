<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- emerald brand gradient: #34d399 (acc) -> #1d9e75 (acc2) -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#1d9e75"/>
    </linearGradient>
    <!-- Apple specular: soft top highlight -->
    <radialGradient id="spec" cx="0.5" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- bottom inner shade for depth -->
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#063b2a" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="anvilshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#06140d" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#shade)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#spec)"/>
  <!-- crisp 1px inner light edge -->
  <rect x="3" y="3" width="1018" height="1018" rx="221" ry="221" fill="none"
        stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>

  <!-- anvil (white) -->
  <g fill="#ffffff" filter="url(#anvilshadow)">
    <!-- top slab + left horn -->
    <path d="M 250 452 L 432 410 L 740 410 L 740 470 L 396 470 Z"/>
    <!-- pedestal: waist + flared base -->
    <path d="M 446 470 L 586 470 L 556 556 L 640 590 L 666 652 L 366 652 L 392 590 L 476 556 Z"/>
  </g>
</svg>
