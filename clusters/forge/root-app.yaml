# App-of-apps: Argo CD watches clusters/forge/apps/ and reconciles every
# platform component + workload defined there. Push to main -> cluster converges.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bapista/forge.git
    targetRevision: main
    path: clusters/forge/apps
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated: { prune: true, selfHeal: true }
