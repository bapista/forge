name: validate
on:
  push: { branches: [main] }
  pull_request:
jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: relaxed
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
      - name: kustomize build (workloads render cleanly)
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz" | tar xz
          ./kustomize build bundle && ./kustomize build advanced/workloads/podinfo > /dev/null && echo "manifests render OK"
